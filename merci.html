<!DOCTYPE html>

.box{
    max-width:700px;

h1{

p{

a{

    padding:14px 24px;
    background:#53fc18;
    color:black;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h1>✅ Inscription reçue</h1>

<p>

</p>
