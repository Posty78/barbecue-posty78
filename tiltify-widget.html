<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; font-family: 'Open Sans', sans-serif; }
  #widget { position: fixed; top: 20px; left: 20px; width: 600px; height: 40px; background: rgba(0,0,0,0.35); border-radius: 8px; overflow: hidden; }
  #bar-fill { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg, #00cc44, #00ff55); width: 0%; transition: width 1s ease; border-radius: 8px; }
  #content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
  #content span { font-size: 18px; font-weight: 700; color: #fff; text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0px 2px 0 #000, 0px -2px 0 #000, 2px 0px 0 #000, -2px 0px 0 #000; }
  #alert { position: fixed; top: 80px; left: 200px; width: 220px; display: none; flex-direction: column; align-items: center; gap: 6px; }
  #alert.show { display: flex; }
  #alert-box { background: rgba(0,0,0,0.8); border: 2px solid #00cc44; border-radius: 8px; padding: 6px 10px; text-align: center; width: 100%; }
  #alert-name { font-size: 14px; font-weight: 700; color: #00ff55; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
  #alert-amount { font-size: 13px; font-weight: 700; color: #fff; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; margin-top: 2px; }
  #alert-comment { font-size: 11px; font-weight: 700; color: #ffdd00; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; margin-top: 2px; font-style: italic; }
  #alert-gif { width: 220px; height: 160px; object-fit: cover; border-radius: 10px; border: 3px solid #00cc44; }
  #test-btn { position: fixed; bottom: 20px; left: 20px; background: #00cc44; color: #000; font-size: 14px; font-weight: 700; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div id="widget">
  <div id="bar-fill"></div>
  <div id="content">
    <span id="raised">€0.00</span>
    <span id="title">DON POUR LES RESTAURANTS DU CŒUR</span>
    <span id="goal">€1,000.00</span>
  </div>
</div>
<div id="alert">
  <div id="alert-box">
    <div id="alert-name"></div>
    <div id="alert-amount"></div>
    <div id="alert-comment"></div>
  </div>
  <img id="alert-gif" src="surprise-shocked.gif" alt="alert">
</div>
<audio id="alert-sound" src="applaudissement.mp4"></audio>
<button id="test-btn" onclick="triggerAlert('TestDonateur', '€5.00', 'Super initiative !')">🎉 Tester</button>
<script>
const CAMPAIGN_ID = "ac3a7c31-144b-4a84-be7d-5f709f637211";
let lastDonationId = null;
let alertActive = false;
async function fetchData() {
  try {
    const res = await fetch("https://v5api.tiltify.com/api/public/campaigns/" + CAMPAIGN_ID);
    const data = await res.json();
    const raised = parseFloat(data.data?.amount_raised?.value || 0);
    const goal = parseFloat(data.data?.goal?.value || 1000);
    const pct = Math.min((raised / goal) * 100, 100);
    document.getElementById("raised").textContent = "€" + raised.toFixed(2);
    document.getElementById("goal").textContent = "€" + goal.toFixed(2);
    document.getElementById("bar-fill").style.width = pct + "%";
  } catch(e) {}
}
async function checkDonations() {
  try {
    const res = await fetch("https://v5api.tiltify.com/api/public/campaigns/" + CAMPAIGN_ID + "/donations?limit=1");
    const data = await res.json();
    const donations = data.data;
    if (!donations || donations.length === 0) return;
    const latest = donations[0];
    if (lastDonationId === null) { lastDonationId = latest.id; return; }
    if (latest.id !== lastDonationId) {
      lastDonationId = latest.id;
      triggerAlert(latest.donor_name || "Anonyme", "€" + parseFloat(latest.amount.value).toFixed(2), latest.donor_comment || "");
    }
  } catch(e) {}
}
function triggerAlert(name, amount, comment) {
  if (alertActive) return;
  alertActive = true;
  document.getElementById("alert-name").textContent = name;
  document.getElementById("alert-amount").textContent = amount;
  document.getElementById("alert-comment").textContent = comment ? '"' + comment + '"' : "";
  document.getElementById("alert-comment").style.display = comment ? "block" : "none";
  const gif = document.getElementById("alert-gif");
  gif.src = "surprise-shocked.gif?" + Date.now();
  const sound = document.getElementById("alert-sound");
  sound.currentTime = 0;
  sound.play();
  document.getElementById("alert").classList.add("show");
  setTimeout(() => {
    document.getElementById("alert").classList.remove("show");
    sound.pause();
    sound.currentTime = 0;
    alertActive = false;
  }, 15000);
}
fetchData();
setInterval(fetchData, 30000);
setInterval(checkDonations, 12000);
</script>
</body>
</html>
